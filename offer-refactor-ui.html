<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OfferIQ — Build Profitable Offers With Intelligence</title>
<meta name="description" content="OfferIQ turns any idea into a complete revenue system — intelligence, copy, funnel, and traffic strategy, built in one session." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#08080D;
    --bg-alt:#0B0B12;
    --surface:#14141F;
    --surface-2:#191927;
    --surface-3:#1E1E2E;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.14);
    --text:#F5F5F7;
    --text-dim:#A6A6B3;
    --text-faint:#6B6B7B;
    --violet:#8B5CF6;
    --violet-soft:#A78BFA;
    --magenta:#EC4899;
    --blue:#4F8CFF;
    --amber:#F5A623;
    --green:#34D399;
    --gradient-primary: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
    --gradient-primary-hover: linear-gradient(135deg, #9B6FF7 0%, #F158A3 100%);
    --gradient-text: linear-gradient(135deg, #C4B5FD 0%, #F9A8D4 100%);
    --gradient-bar: linear-gradient(90deg, #8B5CF6 0%, #EC4899 55%, #F5A623 100%);
    --font-display:'Clash Display', 'General Sans', sans-serif;
    --font-body:'General Sans', -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --radius-sm:10px;
    --radius-md:16px;
    --radius-lg:24px;
    --container: 1180px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    line-height:1.6;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  img{max-width:100%; display:block;}
  ul{list-style:none;}

  ::selection{background:var(--violet); color:#fff;}

  :focus-visible{
    outline:2px solid var(--violet-soft);
    outline-offset:3px;
    border-radius:4px;
  }

  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--surface-3); border-radius:10px;}

  .wrap{max-width:var(--container); margin:0 auto; padding:0 28px;}

  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--font-mono);
    font-size:12.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--violet-soft);
    margin-bottom:18px;
  }
  .eyebrow::before{
    content:'';
    width:7px; height:7px;
    border-radius:50%;
    background:var(--gradient-primary);
    box-shadow:0 0 12px rgba(236,72,153,0.6);
  }

  h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; letter-spacing:-0.02em; line-height:1.08;}

  .section{padding:120px 0;}
  @media (max-width:768px){ .section{padding:76px 0;} }

  .section-head{max-width:680px; margin-bottom:64px;}
  .section-head.center{margin-left:auto; margin-right:auto; text-align:center;}
  .section-head h2{font-size:clamp(28px,4vw,44px); margin-bottom:18px;}
  .section-head p{font-size:17px; color:var(--text-dim); max-width:560px;}
  .section-head.center p{margin-left:auto; margin-right:auto;}

  .grad-text{
    background:var(--gradient-text);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    padding:15px 28px;
    border-radius:100px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:15px;
    white-space:nowrap;
    transition:transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .btn-primary{
    background:var(--gradient-primary);
    color:#fff;
    box-shadow:0 8px 30px -8px rgba(139,92,246,0.6);
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 36px -6px rgba(236,72,153,0.55); background:var(--gradient-primary-hover);}
  .btn-ghost{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border-strong);
    color:var(--text);
  }
  .btn-ghost:hover{background:rgba(255,255,255,0.08); transform:translateY(-2px);}
  .btn-sm{padding:10px 18px; font-size:13.5px;}
  .btn svg{width:16px; height:16px; flex-shrink:0;}

  /* ---------- NAV ---------- */
  .nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding:20px 0;
    transition:padding 0.3s ease, background 0.3s ease, border 0.3s ease;
    border-bottom:1px solid transparent;
  }
  .nav.scrolled{
    padding:12px 0;
    background:rgba(8,8,13,0.82);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
  }
  .nav .wrap{display:flex; align-items:center; justify-content:space-between;}
  .nav-logo{display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-size:19px; font-weight:600;}
  .nav-logo .mark{
    width:30px; height:30px; border-radius:9px;
    background:var(--gradient-primary);
    position:relative;
    box-shadow:0 4px 16px -4px rgba(139,92,246,0.7);
  }
  .nav-logo .mark::after{
    content:'';
    position:absolute; inset:0; margin:auto;
    width:10px; height:10px;
    background:#fff; border-radius:3px;
    top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg);
  }
  .nav-links{display:flex; align-items:center; gap:36px;}
  .nav-links a{font-size:14.5px; color:var(--text-dim); transition:color 0.2s;}
  .nav-links a:hover{color:var(--text);}
  .nav-cta{display:flex; align-items:center; gap:14px;}
  @media (max-width:900px){
    .nav-links{display:none;}
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    padding:170px 0 100px;
    background:
      radial-gradient(ellipse 900px 500px at 82% 8%, rgba(139,92,246,0.30), transparent 60%),
      radial-gradient(ellipse 700px 500px at 10% 30%, rgba(236,72,153,0.16), transparent 60%),
      var(--bg);
    overflow:hidden;
  }
  .hero::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse 900px 500px at 60% 0%, black, transparent 75%);
    pointer-events:none;
  }
  .hero-grid{
    position:relative; z-index:1;
    display:grid;
    grid-template-columns:1.05fr 0.95fr;
    gap:56px;
    align-items:center;
  }
  @media (max-width:980px){ .hero-grid{grid-template-columns:1fr; text-align:center;} }

  .hero-copy h1{font-size:clamp(36px,5.2vw,58px); margin-bottom:24px;}
  .hero-copy .lede{font-size:18px; color:var(--text-dim); max-width:520px; margin-bottom:34px;}
  @media (max-width:980px){ .hero-copy .lede{margin-left:auto; margin-right:auto;} }

  .hero-cta-row{display:flex; flex-wrap:wrap; gap:16px; margin-bottom:22px;}
  @media (max-width:980px){ .hero-cta-row{justify-content:center;} }
  .hero-micro{font-family:var(--font-mono); font-size:12.5px; color:var(--text-faint); letter-spacing:0.02em; line-height:1.8;}

  .hero-visual{position:relative;}
  .browser-frame{
    background:var(--surface);
    border:1px solid var(--border-strong);
    border-radius:var(--radius-md);
    overflow:hidden;
    box-shadow:0 40px 90px -30px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
    transform:perspective(1400px) rotateY(-6deg) rotateX(2deg);
    transition:transform 0.6s ease;
  }
  .browser-frame:hover{transform:perspective(1400px) rotateY(-2deg) rotateX(1deg);}
  .browser-bar{
    display:flex; align-items:center; gap:8px;
    padding:12px 16px;
    background:var(--surface-2);
    border-bottom:1px solid var(--border);
  }
  .browser-bar span{width:9px; height:9px; border-radius:50%; background:var(--border-strong);}
  .browser-bar .url{
    margin-left:10px;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--text-faint);
    background:rgba(255,255,255,0.04);
    padding:4px 10px;
    border-radius:6px;
  }

  /* ---------- CUSTOM MOCKUP ILLUSTRATIONS (replace screenshots) ---------- */
  .mock-report{padding:26px 26px 30px;}
  .mock-report-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px;}
  .mock-report-title{font-family:var(--font-display); font-size:15px; font-weight:600;}
  .mock-report-title span{display:block; font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); font-weight:400; letter-spacing:0.06em; text-transform:uppercase; margin-top:3px;}
  .mock-ring{
    width:64px; height:64px; border-radius:50%;
    background:conic-gradient(var(--violet) 0% 82%, rgba(255,255,255,0.08) 82% 100%);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .mock-ring::after{
    content:'82'; font-family:var(--font-mono); font-weight:600; font-size:16px;
    width:50px; height:50px; border-radius:50%;
    background:var(--surface); display:flex; align-items:center; justify-content:center;
  }
  .mock-rows{display:flex; flex-direction:column; gap:10px;}
  .mock-row{
    display:flex; align-items:center; gap:12px;
    background:var(--surface-2); border:1px solid var(--border); border-radius:10px;
    padding:11px 14px; font-size:13px; color:var(--text-dim);
  }
  .mock-row .dot{width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; box-shadow:0 0 0 0 rgba(52,211,153,0.5); animation:pulseDot 2.4s infinite;}
  .mock-row .dot.pending{background:var(--amber); animation:none;}
  .mock-row b{color:var(--text); font-weight:600;}
  .mock-row .pct{margin-left:auto; font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint);}

  .mock-copy{padding:26px;}
  .mock-copy-line{height:11px; border-radius:5px; background:var(--surface-2); margin-bottom:12px; position:relative; overflow:hidden;}
  .mock-copy-line::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    animation:shimmer 2.6s infinite;
  }
  @keyframes shimmer{ 0%{transform:translateX(-100%);} 100%{transform:translateX(100%);} }
  .mock-copy-caret{display:inline-block; width:2px; height:14px; background:var(--violet-soft); margin-left:2px; animation:blink 1s step-end infinite; vertical-align:middle;}
  @keyframes blink{ 50%{opacity:0;} }

  .mock-pages{padding:26px; display:flex; gap:16px;}
  .mock-page-thumb{flex:1; border-radius:10px; overflow:hidden; border:1px solid var(--border); background:var(--surface-2);}
  .mock-page-thumb .bar{height:8px; background:var(--gradient-primary);}
  .mock-page-thumb .body{padding:12px; display:flex; flex-direction:column; gap:6px;}
  .mock-page-thumb .body div{height:6px; border-radius:3px; background:rgba(255,255,255,0.08);}
  .mock-page-thumb .body div:nth-child(1){width:70%;}
  .mock-page-thumb .body div:nth-child(2){width:100%;}
  .mock-page-thumb .body div:nth-child(3){width:45%;}
  .mock-swatches{display:flex; gap:6px; padding:0 12px 12px;}
  .mock-swatch{width:16px; height:16px; border-radius:5px;}

  .mock-traffic{padding:26px;}
  .mock-bar-row{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .mock-bar-row .plat{width:64px; font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); flex-shrink:0;}
  .mock-bar-track{flex:1; height:8px; border-radius:6px; background:var(--surface-2); overflow:hidden;}
  .mock-bar-fill{height:100%; border-radius:6px; background:var(--gradient-primary);}
  .mock-bar-row .val{font-family:var(--font-mono); font-size:11px; color:var(--text-faint); width:34px; text-align:right;}

  .media-caption{
    font-family:var(--font-mono); font-size:11px; color:var(--text-faint);
    padding:12px 16px; border-top:1px solid var(--border); background:var(--surface-2);
  }

  .float-card{
    position:absolute;
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    border-radius:14px;
    padding:14px 16px;
    box-shadow:0 20px 50px -16px rgba(0,0,0,0.6);
    animation:floatY 5s ease-in-out infinite;
  }
  @keyframes floatY{ 0%,100%{transform:translateY(0px);} 50%{transform:translateY(-10px);} }
  .float-score{
    top:-30px; right:-18px;
    display:flex; align-items:center; gap:12px;
  }
  @media (max-width:980px){ .float-score{right:8px;} }
  .score-ring{
    width:52px; height:52px; border-radius:50%;
    background:conic-gradient(var(--violet) 0% 82%, rgba(255,255,255,0.08) 82% 100%);
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .score-ring::after{
    content:'82';
    font-family:var(--font-mono); font-weight:600; font-size:14px;
    width:40px; height:40px; border-radius:50%;
    background:var(--surface-2);
    display:flex; align-items:center; justify-content:center;
  }
  .float-score .label{font-family:var(--font-mono); font-size:11px; color:var(--text-faint); letter-spacing:0.06em; text-transform:uppercase;}
  .float-score .value{font-size:13.5px; font-weight:600; margin-top:2px;}

  .float-pulse{
    bottom:-24px; left:-20px;
    animation-delay:1.2s;
    display:flex; align-items:center; gap:10px;
  }
  @media (max-width:980px){ .float-pulse{left:8px;} }
  .pulse-dot{width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 0 0 rgba(52,211,153,0.6); animation:pulseDot 1.8s infinite;}
  @keyframes pulseDot{ 0%{box-shadow:0 0 0 0 rgba(52,211,153,0.5);} 70%{box-shadow:0 0 0 8px rgba(52,211,153,0);} 100%{box-shadow:0 0 0 0 rgba(52,211,153,0);} }
  .float-pulse .txt{font-family:var(--font-mono); font-size:12px;}
  .float-pulse .txt b{color:var(--green); font-weight:600;}

  /* ---------- REVEAL ---------- */
  .reveal{opacity:0; transform:translateY(28px); transition:opacity 0.8s ease, transform 0.8s ease;}
  .reveal.in{opacity:1; transform:translateY(0);}

  /* ---------- WHY THIS MATTERS ---------- */
  .why-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-bottom:40px;}
  @media (max-width:900px){ .why-grid{grid-template-columns:1fr;} }
  .why-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
    padding:32px 28px; transition:border-color 0.3s ease, transform 0.3s ease;
  }
  .why-card:hover{border-color:rgba(139,92,246,0.35); transform:translateY(-4px);}
  .why-icon{
    width:44px; height:44px; border-radius:12px;
    display:flex; align-items:center; justify-content:center; margin-bottom:20px;
    background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.25);
    color:var(--violet-soft);
  }
  .why-icon svg{width:22px; height:22px;}
  .why-card .stat{font-family:var(--font-display); font-size:32px; margin-bottom:6px; background:var(--gradient-text); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .why-card .tag{font-family:var(--font-mono); font-size:11.5px; color:var(--magenta); letter-spacing:0.06em; text-transform:uppercase; display:block; margin-bottom:10px;}
  .why-card p{color:var(--text-dim); font-size:14.5px; margin-bottom:14px;}
  .why-card .src{font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint);}
  .why-close{
    text-align:center; font-size:17px; font-weight:500; max-width:640px; margin:0 auto; padding-top:8px;
  }
  .why-close .accent{color:var(--violet-soft);}

  /* ---------- CHOICE GATE ---------- */
  .gate-grid{display:grid; grid-template-columns:1fr 1fr; gap:24px;}
  @media (max-width:820px){ .gate-grid{grid-template-columns:1fr;} }
  .gate-card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:36px;
    overflow:hidden;
    transition:transform 0.35s ease, border-color 0.35s ease;
  }
  .gate-card:hover{transform:translateY(-6px); border-color:rgba(139,92,246,0.4);}
  .gate-card::before{
    content:'';
    position:absolute; top:-60%; right:-40%;
    width:280px; height:280px; border-radius:50%;
    background:var(--gradient-primary); opacity:0.14; filter:blur(50px);
  }
  .gate-icon{
    width:46px; height:46px; border-radius:13px; position:relative;
    background:var(--gradient-primary); display:flex; align-items:center; justify-content:center;
    margin-bottom:20px; box-shadow:0 10px 26px -10px rgba(139,92,246,0.6);
  }
  .gate-icon svg{width:22px; height:22px; color:#fff;}
  .gate-index{font-family:var(--font-mono); font-size:12.5px; color:var(--text-faint); margin-bottom:14px; position:relative;}
  .gate-card h3{font-size:24px; margin-bottom:14px; position:relative;}
  .gate-card p{color:var(--text-dim); font-size:15px; margin-bottom:26px; position:relative;}
  .gate-inputs{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:28px; position:relative;}
  .chip{
    display:inline-flex; align-items:center; gap:7px;
    font-family:var(--font-mono); font-size:12px;
    padding:7px 13px; border-radius:100px;
    background:rgba(255,255,255,0.04); border:1px solid var(--border);
    color:var(--text-dim);
  }
  .chip svg{width:13px; height:13px;}

  /* ---------- HOW IT WORKS ---------- */
  .timeline{position:relative; margin-top:20px;}
  .timeline::before{
    content:'';
    position:absolute; left:27px; top:14px; bottom:14px; width:1px;
    background:linear-gradient(var(--violet), var(--magenta), transparent);
  }
  @media (max-width:700px){ .timeline::before{left:19px;} }
  .tl-item{display:grid; grid-template-columns:56px 1fr; gap:24px; padding-bottom:36px; position:relative;}
  @media (max-width:700px){ .tl-item{grid-template-columns:40px 1fr; gap:16px;} }
  .tl-item:last-child{padding-bottom:0;}
  .tl-num{
    width:56px; height:56px; border-radius:50%;
    background:var(--surface-2); border:1px solid var(--border-strong);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-weight:600; font-size:16px;
    color:var(--violet-soft); position:relative; z-index:1; flex-shrink:0;
  }
  @media (max-width:700px){ .tl-num{width:40px; height:40px; font-size:13px;} }
  .tl-body{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
    padding:24px 28px; display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap;
    transition:border-color 0.3s ease;
  }
  .tl-body:hover{border-color:var(--border-strong);}
  .tl-body h4{font-size:18px; margin-bottom:6px;}
  .tl-body p{color:var(--text-dim); font-size:14.5px; max-width:560px;}
  .tl-time{
    font-family:var(--font-mono); font-size:13px; color:var(--amber);
    background:rgba(245,166,35,0.1); border:1px solid rgba(245,166,35,0.25);
    padding:6px 14px; border-radius:100px; white-space:nowrap;
  }
  .tl-foot{margin-top:8px; color:var(--text-dim); font-size:14.5px;}

  /* ---------- FEATURE SHOWCASE ---------- */
  .feature-row{
    display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:center;
    padding:70px 0; border-bottom:1px solid var(--border);
  }
  .feature-row:last-of-type{border-bottom:none;}
  .feature-row.reverse .feature-copy{order:2;}
  .feature-row.reverse .feature-media{order:1;}
  @media (max-width:900px){
    .feature-row{grid-template-columns:1fr; gap:32px; padding:44px 0;}
    .feature-row.reverse .feature-copy, .feature-row.reverse .feature-media{order:initial;}
  }
  .feature-tag{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--font-mono); font-size:12px; color:var(--blue);
    letter-spacing:0.08em; text-transform:uppercase; margin-bottom:16px;
  }
  .feature-copy h3{font-size:clamp(22px,3vw,30px); margin-bottom:18px;}
  .feature-list{display:flex; flex-direction:column; gap:14px; margin-top:22px;}
  .feature-list li{display:flex; gap:12px; align-items:flex-start; font-size:15px; color:var(--text-dim);}
  .feature-list li svg{width:18px; height:18px; flex-shrink:0; margin-top:3px; color:var(--green);}

  /* ---------- SCENARIOS ---------- */

  .scenario-body{color:var(--text-dim); font-size:14.5px;}
  .scenario-stats{display:flex; flex-direction:column; gap:16px;}
  .scenario-stat{display:flex; align-items:center; gap:16px; background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:17px 20px;}
  .scenario-stat svg{width:20px; height:20px; color:var(--violet-soft); flex-shrink:0;}
  .scenario-stat .from{color:var(--text-faint); font-size:13.5px; text-decoration:line-through;}
  .scenario-stat .to{font-size:16.5px; font-weight:600; color:var(--green);}

  /* ---------- COMPARISON TABLE ---------- */

  .guarantee-strip{

    margin-top:48px; padding:20px; border:1px dashed var(--border-strong); border-radius:14px;
    font-size:14px; color:var(--text-dim); flex-wrap:wrap; text-align:center;
  }
  .guarantee-strip svg{width:22px; height:22px; color:var(--green); flex-shrink:0;}

  /* ---------- FAQ ---------- */
  .faq-list{display:flex; flex-direction:column; gap:14px;}
  .faq-item{background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color 0.25s ease;}
  .faq-item.open{border-color:var(--border-strong);}

    display:flex; justify-content:space-between; align-items:center; gap:20px;

  .final-cta p{color:var(--text-dim); font-size:16px; max-width:520px; margin:0 auto 34px;}
  .final-cta-row{display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:18px;}
  .final-urgency{font-family:var(--font-mono); font-size:12.5px; color:var(--amber);}

  /* ---------- FOOTER ---------- */
  footer{padding:60px 0 36px; border-top:1px solid var(--border);}
  .footer-top{display:flex; justify-content:space-between; gap:40px; flex-wrap:wrap; margin-bottom:50px;}

  .footer-cols{display:flex; gap:64px; flex-wrap:wrap;}
  .footer-col h5{font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-faint); margin-bottom:16px;}
  .footer-col a{display:block; font-size:14px; color:var(--text-dim); margin-bottom:11px; transition:color 0.2s;}

  .footer-bottom{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; padding-top:26px; border-top:1px solid var(--border); font-size:12.5px; color:var(--text-faint);}

  /* ---------- MOBILE STICKY CTA ---------- */
  .mobile-cta{
    position:fixed; bottom:0; left:0; right:0; z-index:90;

  .integration-pill{

    background:var(--surface-2); border:1px solid var(--border);
    padding:7px 12px; border-radius:100px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---------------- ICONS ---------------- */
const Icon = ({ path, ...props }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
    {path}
  </svg>
);
const ArrowRight = (p) => <Icon {...p} path={<path d="M5 12h14M13 5l7 7-7 7" />} />;
const Check = (p) => <Icon {...p} path={<path d="M20 6L9 17l-5-5" />} />;
const Play = (p) => <Icon {...p} path={<path d="M8 5v14l11-7z" fill="currentColor" stroke="none" />} />;
const Shield = (p) => <Icon {...p} path={<path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z" />} />;
const Link2 = (p) => <Icon {...p} path={<><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1-1"/></>} />;
const FileText = (p) => <Icon {...p} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></>} />;
const PenLine = (p) => <Icon {...p} path={<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>} />;
const Target = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></>} />;
const Users = (p) => <Icon {...p} path={<><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
const DollarSign = (p) => <Icon {...p} path={<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>} />;
const Compass = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>} />;
const TrendingUp = (p) => <Icon {...p} path={<><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>} />;
const Zap = (p) => <Icon {...p} path={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />;
const Clock = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
const Globe = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>} />;
const Lock = (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
const RefreshCw = (p) => <Icon {...p} path={<><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>} />;
const Layers = (p) => <Icon {...p} path={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} />;
const Rocket = (p) => <Icon {...p} path={<><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></>} />;
const Package = (p) => <Icon {...p} path={<><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4a2 2 0 0 0 1-1.73z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>} />;
const Palette = (p) => <Icon {...p} path={<><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2a10 10 0 1 0 0 20c.93 0 1.5-.8 1.5-1.5a2.4 2.4 0 0 0-.62-1.6 2 2 0 0 1 1.12-3.4h1.28A5.72 5.72 0 0 0 21 10c0-4.42-4.03-8-9-8z"/></>} />;

/* ---------------- SCROLL REVEAL HOOK ---------------- */
function useReveal(){
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if(!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if(entry.isIntersecting){ setInView(true); obs.unobserve(el); }
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}
const Reveal = ({ children, className = "" }) => {
  const [ref, inView] = useReveal();
  return <div ref={ref} className={`reveal ${inView ? 'in' : ''} ${className}`}>{children}</div>;
};

/* ---------------- NAV ---------------- */
function Nav(){
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="wrap">
        <div className="nav-logo"><div className="mark"></div>OfferIQ</div>

/* ---------------- CALCULATOR ---------------- */
function Calculator(){
  const [offers, setOffers] = useState(5);
  const manualCostPerOffer = 8000; // conservative blended low-end estimate across strategist/copywriter/designer/media-buyer
  const starterAnnual = 39 * 12; // $468/yr, 5 credits/mo = 60/yr capacity
  const growthAnnual = 69 * 12; // $828/yr, 10 credits/mo = 120/yr capacity
  const manualTotal = offers * manualCostPerOffer;
  const iqTotal = offers <= 60 ? starterAnnual : growthAnnual;
  const savings = manualTotal - iqTotal;
  const fmt = (n) => "$" + n.toLocaleString();
  return (
    <section className="section" id="calculator">
      <div className="wrap">
        <Reveal>
          <div className="section-head center">
            <span className="eyebrow">Do The Math</span>
            <h2>What would this cost you to build manually?</h2>
            <p>Drag the slider to your actual launch plan for the year.</p>
          </div>
        </Reveal>
        <Reveal>
          <div className="calc">
            <div>
              <div className="calc-slider-label"><span>Offers you want to launch this year</span><b>{offers}</b></div>
              <input type="range" min="1" max="30" value={offers} onChange={e => setOffers(parseInt(e.target.value))} />
              <p style={{marginTop:'22px', fontSize:'13.5px', color:'var(--text-faint)'}}>Based on a conservative blended estimate of $8,000 per offer for a strategist, copywriter, designer, and media buyer working separately.</p>
            </div>
            <div className="calc-result">
              <div className="calc-line old"><span className="l">Hiring it out</span><span className="v">{fmt(manualTotal)}</span></div>
              <div className="calc-line new"><span className="l">With OfferIQ (annual plan)</span><span className="v">{fmt(iqTotal)}</span></div>
              <div className="calc-save">
                <b>{fmt(savings)} saved</b>
                <span>Across {offers} offer{offers > 1 ? 's' : ''} this year</span>
              </div>
            </div>
          </div>
        </Reveal>
      </div>
    </section>
  );
}
